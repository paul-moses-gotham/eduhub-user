<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - DMPC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('https://tse1.explicit.bing.net/th/id/OIP.T218rwMbZPobq2FwmMLPfwHaE7?rs=1&pid=ImgDetMain&o=7&rm=3') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .navbar {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .navbar ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .navbar ul li a:hover {
            color: #ffd700;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.18);
            margin-top: 120px;
            animation: fadeIn 1s ease;
        }

        .container h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        .help-desk {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            font-size: 16px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        .help-desk a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
        }

        .help-desk a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            .container h1 {
                font-size: 28px;
            }

            .navbar ul {
                gap: 20px;
            }
        }

        /* --- Mobile View (Phones) --- */
        @media (max-width: 600px) {

            .admin-layout {
                flex-direction: column;
            }

            .btn-upload {
                font-size: 0.9rem;
            }
        }

        /* --- Tablet View --- */
        @media (min-width: 601px) and (max-width: 1024px) {}

        /* --- Desktop View (Large Screens) --- */
        @media (min-width: 1025px) {}
    </style>
</head>

<body>
    <nav class="navbar">
        <ul>
            <li><a href="UHome.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>Contact Us</h1>
        <div class="help-desk">
            <p><strong>Help Desk:</strong> For any queries, directly email our admin at
                <a href="mailto:gothampaulmoses@gmail.com">gothampaulmoses@gmail.com</a>
            </p>
        </div>
    </div>
</body>

</html>
