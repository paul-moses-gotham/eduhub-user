<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials - DMPC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            min-height: 100vh;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 154, 158, 0.6);
        }

        .header p {
            opacity: 0.8;
            margin-top: 10px;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .subject-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .subject-card:hover {
            transform: translateY(-8px);
            border-color: #ff9a9e;
            box-shadow: 0 12px 40px rgba(255, 154, 158, 0.3);
        }

        .subject-card h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-material {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-notes {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: #333;
        }

        .btn-pyqs {
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
            color: #333;
        }

        .btn-classes {
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-material:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .no-data {
            text-align: center;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: #ff9a9e;
            transform: translateX(-3px);
        }

        /* Modal Overlay Background Layout */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Modal Popup Content Box Container */
        .modal-box {
            background: #2a1b4e;
            border: 2px solid #ff9a9e;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: scale(0.8);
            transition: 0.3s ease;
            color: white;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            color: #ff9a9e;
        }

        .close-modal-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .modal-list-container::-webkit-scrollbar {
            width: 5px;
        }

        .modal-list-container::-webkit-scrollbar-thumb {
            background: #ff9a9e;
            border-radius: 10px;
        }

        .modal-item-link {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 15px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-item-link:hover {
            background: rgba(255, 154, 158, 0.2);
            border-color: #ff9a9e;
            transform: translateX(5px);
        }

        /* --- Mobile View (Phones) --- */
        @media (max-width: 600px) {

            .admin-layout {
                flex-direction: column;
            }

            .btn-upload {
                font-size: 0.9rem;
            }
        }

        /* --- Tablet View --- */
        @media (min-width: 601px) and (max-width: 1024px) {}

        /* --- Desktop View (Large Screens) --- */
        @media (min-width: 1025px) {}
    </style>
</head>

<body>

    <a href="javascript:history.back()" class="back-btn">← Back</a>

    <div class="header">
        <h1 id="titleDisplay">Loading...</h1>
        <p id="subTitleDisplay">Fetching your subjects</p>

    </div>
    <div class="subjects-grid" id="subjectsContainer"></div>

    <div class="modal-overlay" id="materialModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modalTitle">Available Files</h2>
                <button class="close-modal-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-list-container" id="modalList"></div>
        </div>
    </div>

    <script>
        // Production Live Render API Base URL
        const RENDER_BACKEND_URL = "https://diploma-backend-07kx.onrender.com";
        let globalSubjectsList = [];

        // Helper function to replace localhost links with Production URL dynamically
        function fixUrl(url) {
            if (!url || typeof url !== 'string') return "#";
            if (url.includes('localhost:5001')) {
                return url.replace('http://localhost:5001', RENDER_BACKEND_URL);
            }
            return url;
        }


        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const scheme = urlParams.get('scheme');
            const sem = urlParams.get('sem');

            if (!scheme || !sem) {
                document.getElementById('subjectsContainer').innerHTML = "<p class='no-data'>Invalid URL parameters.</p>";
                return;
            }

            document.getElementById('titleDisplay').textContent = `${scheme.toUpperCase()} Subjects`;
            document.getElementById('subTitleDisplay').textContent = `Semester: ${sem.toUpperCase()}`;

            fetch(`${RENDER_BACKEND_URL}/get-subjects?scheme=${scheme}&sem=${sem}`)
                .then(res => res.json())
                .then(subjects => {
                    globalSubjectsList = subjects;
                    const container = document.getElementById('subjectsContainer');
                    container.innerHTML = "";

                    if (subjects.length === 0) {
                        container.innerHTML = "<p class='no-data'>No subjects added yet for this semester.</p>";
                    } else {
                        subjects.forEach(sub => {
                            const card = document.createElement('div');
                            card.className = 'subject-card';
                            card.innerHTML = `
                        <h3>${sub.name}</h3>
                        <div class="action-buttons">
                            <button class="btn-material btn-notes" onclick="openMaterialPopup('${sub.id}', 'notes')">📝 View Notes</button>
                            <button class="btn-material btn-pyqs" onclick="openMaterialPopup('${sub.id}', 'pyqs')">📊 View PYQs</button>
                            <button class="btn-material btn-classes" onclick="openMaterialPopup('${sub.id}', 'video')">📺 View Classes</button>
                        </div>
                    `;
                            container.appendChild(card);
                        });
                    }
                })
                .catch(err => {
                    console.error('Data pull interaction failure:', err);
                    document.getElementById('subjectsContainer').innerHTML = "<p class='no-data'>Error loading subjects. Please check connection.</p>";
                });
        });

        function openMaterialPopup(subjectId, type) {
            const subject = globalSubjectsList.find(s => s.id === subjectId);
            if (!subject) return;

            let filesArray = subject[type];

            // Normalize string to array
            if (typeof filesArray === 'string' && filesArray.trim() !== "") {
                filesArray = [filesArray];
            }

            if (!filesArray || !Array.isArray(filesArray) || filesArray.length === 0) {
                alert(`Materials not available yet for this section!`);
                return;
            }

            // Set dynamic titles
            const titles = { notes: '📚 Select Notes Chapter', pyqs: '📊 Select Question Paper', video: '📺 Select Video Lecture' };
            const icons = { notes: '📄', pyqs: '📑', video: '▶️' };

            document.getElementById('modalTitle').textContent = titles[type];
            const container = document.getElementById('modalList');
            container.innerHTML = "";

            filesArray.forEach((rawLink, i) => {
                // --- ఇక్కడ fixUrl వాడాము: ఏ లింక్ అయినా కరెక్ట్ పబ్లిక్ లింక్ అవుతుంది ---
                const link = fixUrl(rawLink);

                let displayName = "";
                if (link.includes('youtube.com') || link.includes('youtu.be')) {
                    displayName = `Video Lecture Part - ${i + 1}`;
                } else {
                    displayName = link.split('/').pop().replace(/^\d+-/, '');
                    displayName = decodeURIComponent(displayName);
                }

                const a = document.createElement('a');
                a.href = link;
                a.target = "_blank";
                a.className = "modal-item-link";
                a.innerHTML = `<span>${icons[type]}</span> <span>${displayName}</span>`;
                a.onclick = () => { closeModal(); };
                container.appendChild(a);
            });

            document.getElementById('materialModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('materialModal').classList.remove('active');
        }

        document.addEventListener('click', function (event) {
            const modal = document.getElementById('materialModal');
            if (event.target === modal) {
                closeModal();
            }
        });

    </script>
</body>

</html>
