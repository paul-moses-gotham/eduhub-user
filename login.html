<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - DMPC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px 35px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #ff9a9e;
            text-shadow: 0 0 10px #ff9a9e;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            margin: 12px 0;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 16px;
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.2);
            transition: background 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            color: #000;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #333;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.6);
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #fad0c4, #ff9a9e);
            transform: scale(1.05);
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
        }

        .message.error {
            color: #ff6b6b;
        }

        .message.success {
            color: #8bc34a;
        }

        .links {
            margin-top: 25px;
            text-align: center;
            display: flex;
            justify-content: space-between;
        }

        .links a {
            color: #ff9a9e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #fad0c4;
            text-decoration: underline;
        }

        /* --- Mobile View (Phones) --- */
        @media (max-width: 600px) {

            .admin-layout {
                flex-direction: column;
            }

            .btn-upload {
                font-size: 0.9rem;
            }
        }

        /* --- Tablet View --- */
        @media (min-width: 601px) and (max-width: 1024px) {}

        /* --- Desktop View (Large Screens) --- */
        @media (min-width: 1025px) {}
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Password" required minlength="6" />
            <button type="submit">Login</button>
            <div class="message" id="message"></div>
        </form>
        <div class="links">
            <a href="register.html">Register</a>
            <a href="reset-password.html">Forgot Password?</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');

        // Live Production Render Backend API Base Endpoint Configuration
        const RENDER_BACKEND_URL = "https://diploma-backend-07kx.onrender.com";

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.textContent = '';
            messageDiv.className = 'message';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Simple client-side validation check
            if (!email || !password) {
                messageDiv.textContent = 'Please fill all fields.';
                messageDiv.classList.add('error');
                return;
            }

            try {
                // Post authentication payloads directly to Render instance routes
                const res = await fetch(`${RENDER_BACKEND_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    messageDiv.classList.add('success');

                    // Save authenticated user profile scope variables into local storage context
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userBranch', data.user.branch);

                    // Route user securely into primary portal dashboard
                    window.location.href = 'user.html';
                } else {
                    messageDiv.textContent = data.message || 'Login failed.';
                    messageDiv.classList.add('error');
                }
            } catch (err) {
                console.error('Authentication process failure:', err);
                messageDiv.textContent = 'Server error. Please try again later.';
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>

</html>
