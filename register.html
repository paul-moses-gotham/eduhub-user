<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - DMPC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px 35px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #ff9a9e;
            text-shadow: 0 0 10px #ff9a9e;
        }

        input,
        select {
            width: 100%;
            padding: 14px 20px;
            margin: 12px 0;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 16px;
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.2);
            transition: background 0.3s ease;
        }

        input:focus,
        select:focus {
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            color: #000;
        }

        /* Styling option tags so dropdown text remains readable */
        select option {
            color: #000;
            background: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #333;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.6);
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #fad0c4, #ff9a9e);
            transform: scale(1.05);
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
        }

        .message.error {
            color: #ff6b6b;
        }

        .message.success {
            color: #8bc34a;
        }

        .login-link {
            margin-top: 25px;
            text-align: center;
            display: block;
            color: #ff9a9e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link:hover {
            color: #fad0c4;
            text-decoration: underline;
        }

        /* --- Mobile View (Phones) --- */
        @media (max-width: 600px) {

            .admin-layout {
                flex-direction: column;
            }

            .btn-upload {
                font-size: 0.9rem;
            }
        }

        /* --- Tablet View --- */
        @media (min-width: 601px) and (max-width: 1024px) {}

        /* --- Desktop View (Large Screens) --- */
        @media (min-width: 1025px) {}
    </style>
</head>

<body>
    <div class="register-container">
        <h2>Create Account</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Full Name" required />
            <select id="branch" required>
                <option value="" disabled selected>Select Branch</option>
                <option value="CME">Computer Engineering</option>
                <option value="ECE">Electronics and Communication Engineering</option>
                <option value="EEE">Electrical and Electronics Engineering</option>
                <option value="MECH">Mechanical Engineering</option>
                <option value="CIVIL">Civil Engineering</option>
                <option value="AA">Architecture Engineering</option>
                <option value="AM">Automobile Engineering</option>
            </select>
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Password" required minlength="6" />
            <input type="text" id="mobile" placeholder="Mobile Number" required pattern="[0-9]{10}"
                title="Enter 10 digit mobile number" />
            <button type="submit">Register</button>
            <div class="message" id="message"></div>
        </form>
        <a href="login.html" class="login-link">Already have an account? Login</a>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');

        // Production Live Render Backend API Base Endpoint Configuration
        const RENDER_BACKEND_URL = "https://diploma-backend-07kx.onrender.com";

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.textContent = '';
            messageDiv.className = 'message';

            const name = document.getElementById('name').value.trim();
            const branch = document.getElementById('branch').value;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const mobile = document.getElementById('mobile').value.trim();

            // Client-side verification processing
            if (!name || !branch || !email || !password || !mobile) {
                messageDiv.textContent = 'Please fill all fields.';
                messageDiv.classList.add('error');
                return;
            }

            try {
                // Post onboarding data payloads directly to Render instance registration route
                const res = await fetch(`${RENDER_BACKEND_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, branch, email, password, mobile })
                });
                const data = await res.json();

                if (res.ok) {
                    messageDiv.textContent = 'Registration successful! Redirecting to login...';
                    messageDiv.classList.add('success');
                    // Route user to login portal view on successful database record commitment
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    messageDiv.textContent = data.message || 'Registration failed.';
                    messageDiv.classList.add('error');
                }
            } catch (err) {
                console.error('Registration dispatch flow error:', err);
                messageDiv.textContent = 'Server error. Please try again later.';
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>

</html>
